body:
  text: 靈城精義術數類三相宅相墓之屬提要臣等謹案靈城精義二卷舊本題南唐何溥撰溥字令通履貫未詳是編上卷論形氣主于山川形勢辨龍辨穴下卷論理氣主于天星卦例生尅吉凶自宋以來諸家書目皆不著録觀其言宇宙有大關合氣運為主又言地運有推移而天氣從之天運有轉旋而地氣應之盖主元運之説者考元運之説以甲子六十年為一元配以洛書九宫凡歴上中下三元為一周更歴三周五百四十年為一運凡為甲子者九每元六十年為大運一元之中二十年為小運以卜地氣之旺相休囚如上元甲子一白司運則坎得旺氣震巽得生氣乾兑得退氣離得死氣坤得鬼氣大抵因皇極經世而推演之其法出自明初寧波幕講僧五代時安有是説其非明以前書確矣其注題曰劉基撰前列引用書目凡二十二種如入式歌之類亦明中葉以後之偽書則出於􅎓作亦無疑義但就其書而論則所云大地無形看氣槩小地無勢看精神水成形山上止山成形水中止龍為地氣水為天氣諸語于彼法之中頗為近理註文亦發揮條暢勝他書之弇鄙猶解文義者之所為術數之書無非依託所言可採即録存以備一家真偽固無庸辨亦不足與辨也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀靈城精義引用書目呉公鉗龍經三寶經呉公閒星説曽文遄龍歌李家龍經素書郭璞𦵏經詳節天表蔡西山所定劉公天機祕要寶鏡地理筌蹄催官篇梅花院纂青囊經董氏明㫖玉尺經呉公解義混元子廖公洩天機靈轄經入式歌白龍記
