body:
  text: 靈城精義卷下南唐何溥撰理氣章正訣地無精氣以星光為精氣地無吉凶以星氣為吉凶夫今之論堪輿家者類以形體為體天星為用甚至以形體為實天星為虚而竟置星學於不講豈知宇宙間精光在天體魄在地卜地而不及天星則體魄止死塊耳葢下之河嶽即上之天辰原非二物如天東有蒼龍在九天謂之蒼天其下即為東嶽北有𤣥武為𤣥天其下即為北嶽南有朱雀謂之炎天其下即為南嶽西有白虎謂之昊天其下即為西嶽中有北極謂之鈞天其下即為中嶽又如上有天河天漢而下即有長江大河上有三垣九野而下即有垣局以域王城有分土以域九州上有十二次舍三百六十五度而下即有十二支辰分限又如人之生也頭頂圓而象乎天趾履地而肖乎方手足象四裔腹心象中土兩眸象日月遊行運動象四時又如一物一器之類任地所有皆天之所為豈有天光地徳而不相蒙者哉乃若星家若稗若甘之所占其於災祥有符契券地氣所鍾其吉其凶有不與天通乎是故古人有云神仙之地多發天門以乾為天而且氣為純陽也帝王之地多起金龍以角亢首二十八宿且天角帝席所在又以乾陽到此正在九五之宫也后妃之地多從地户龍飛鳳舞乃在乾巽之交也翰苑文章之客類多太乙天乙以兩貴人為天司文章之府也台輔宰執之器類多離壬以三台在離最近太微四輔在壬最近紫微皆在帝座之左右也忠良仙聖之風唯艮為多以艮宫一星最為明赤其光異常故異人異氣多産於此也又如將帥邊臣武弁悍卒多産於婁金度以婁金為煞而且魁罡所臨也神壇古刹寡宿孤神多出於井鬼度以鬼金為暗而且太隂所棲也又如太陽在午而諸凶俱不敢臨有君之象以故建都立郡一皆向離而居葢象天星焉他如諸星各各有主而各各有應豈曰𣺌茫乎哉故葬書中云乘生氣者人但知認有形之生氣而不知認無形之生氣正在天光下臨地徳上載之二語也楊氏看行龍多用斗樞之九星如貪狼巨門云云以斗杓居中而運方故行龍取象焉廖氏看入首則用流行之七政如太陰太陽云云以七政運行有常有變而吉凶最切故入首致詳焉其法一準諸天星非臆見也用先天以統龍當詳明於四龍天星用後天以布局尤宜審乎三盤卦例此二段以先天後天為定龍定穴之綱領乃乘氣中第一務也大抵先天卦位乾南坤北離東坎西震巽艮兊居四隅乃陰陽對待之體然乾坤雖云天地定位實為陰陽之老坎離雖云水火不相射亦為陰陽之極以四卦上下二爻皆純陰純陽無化氣也唯艮兊震巽四卦上下二爻皆陰陽相配乃合沖和之象有化生之機且以地法翻卦配合天星則艮為貪狼兊為武曲巽為巨門震為廉貞經以貪巨武為三吉又云大地若無廉作祖為官也不至三公曾文遄所云龍看起祖有降勢有入路有出面有氣鍾而形吉有脈息而枝分大要不出四龍天星之外正謂此也龍歌中云二十四山艮兊亥此是乾坤正龍格艮亥江南奇江北宜西兊庚辛丙丁是天干尋得真龍實為最震巽二卦看東西百里之間妙相㑹陽貴離與壬陰貴艮巽兊此於四龍之外而又取乎亥又取庚辛丙丁又取離與壬者何也從天星也艮兊巽一為天市垣一為太微垣一為少微亦列垣局所以為貴况亥為紫微垣位居北極之尊尤垣局中之最貴者乎乃庚辛丙丁之亦貴者則以艮納丙而稱貪狼巽納辛而稱巨門兊納丁而稱武曲震納庚而稱廉貞也夫離與壬何足貴乎以離居正陽之位諸星到此俱為拱狀實擅其尊如壬與亥同宫最近微垣亦為最貴又如巳為紫微垣之對宫稱帝座之明堂今人以辛丙丁合艮兊巽而稱六秀又以亥巳六秀而稱八貴又以離壬而稱陽六秀之首吉皆從天星也昔所謂統龍法者推而行之大義實不外此夫後天之卦乃分陰分陽之義從乾至坎至艮至震皆為陽列於東北從巽至離至坤至兊皆為陰列於西南其意以為乾坤為老陰老陽退處西北以六子施生布列於東南乃致用之學也辨方定位古人用乎後天意取諸此然古人又有三盤卦例之說者云何正以方位中有吉有凶有貴有賤不可以無辨耳故素書以渾天六十龍裝卦取本來山水中四吉三竒貴人禄馬以定坐穴之吉凶昔人所謂用内卦審山水以定坐穴之純駁者即此卦也寶鏡以七十二龍裝卦取坐向山水中四吉三竒以推本來山水之吉凶昔人所謂用本卦審入穴以推山水之吉凶者即此卦也又如龍脈不合渾天天盤中之四吉三奇則求之地盤坐向又如坐向不合四吉三奇則又於坐向内所串之天盤看是何屬又於此卦取四吉三奇所謂外卦是也然要之吉凶貴賤一當以龍為主如四吉三奇禄馬貴人俱當以龍定之至於乘氣中緊要處又全在平分六十龍上探討當以蔡西山氏所定詳節天表六十龍之分度為準的也葢天盤盈縮則六甲有多寡之差穿山七十二則六甲有斷續之間以之乘氣豈為當乎故三盤卦例古人用之以取四吉三奇貴人禄馬則可若以此法用之乘氣非其旨也故乘氣分度用蔡氏之平分乘氣分金用賴氏之挨加乘氣分金剗度納秀迎官則素書渾天之卦例斯於堪輿之學思過半矣以龍定穴須審入路陰陽以水定向須看歸路陰陽此二段乃以龍上入路歸路之陰陽而乘之為一法如一亥也從庚酉辛而來是左邊來為陽則亥為陽木從壬子癸而來是右邊來為陰則亥為陰木其五行生旺便以此而分此楊公以龍之來路分陰陽也又如庚為陽金墓在丑丁為陰火亦墓在丑此所謂斗牛食庚丁之氣也又如乙丙交而趨戌辛壬㑹而聚辰金羊收癸甲之靈俱是此義昔人所謂墓合者如此故如亥龍從南轉東而入北為陰即為乙木或有丙水朝來歸戌而去即宜立丙向此真陰陽交媾之法劉公天機祕要消水立向之法全在於此此以龍之歸路分陰陽也入手入首則龍與脈之所由辨分金分經則來與坐之所由分此二段一為初定穴時工夫乃開山立向之緊要在此一為既成穴後工夫乃來脈坐度之緊要在此何云入首今人所稱到頭是也凡到頭看是何龍如入首是陰却審後龍多陰則陰為真落如後龍多陽則陰為偽落古人作法多從大勢以後龍為主故多舍去偽落雖不利於初年所不恤也如初一節星體甚秀又有向合又有水合則初年可以催官先哲亦間取暫福而用之此一山一水之作用也若大地則不以暫福為福矣此入首為開山立向之最緊要也何云入手如人之取物入手乃其實受用處葢指穴中之氣脈言也古人所謂草蛇灰線之脈正以入手言耳若有草蛇灰線則脈絡分明真有氣到然氣與脈又有分者以斂而活動處則為脈既有斂聚則氣從脈行但不免終屬陰耳陰不可乘故必到有員暈處乃陰不到而屬陽方可葬也此入手之至精至微處尤為緊要初定穴時全在此處加功何謂分金如亥有五亥一以辛亥丁亥為旺相而己癸為孤虛孤虛不可入旺相所當乘葢從甲子乙丑之金分來而其吉凶美惡不可不審擇也此乘氣中之最緊要處何謂分金二十八宿乃天之經星渾天五行於二十八宿中又各有分屬焉其與分金納音五行相為生尅制化者也穴中有來脈有坐度來脈重分金坐度重分經然坐度為寄寓來脈為本主而寄寓又所以佐本主者也此乘氣中趨生避死之最緊要處也脈有左右落則脈可辨真偽氣審左右加則氣可别淳漓此審落脈處用挨加剪裁為乘氣中最要緊處地理筌蹄云璣皇左落那堪用若遇右落可裁暈皇源左落真貴顯右落壬七産荒涼言亥之單行則純粹不雜為吉若乾與亥雙行須看所落何如左落則乾多不可作如右落則亥多猶可裁量若壬亥雙行亦然夫乾為左而亥為右者以面對來脈而看則乾左而亥右也凡認落脈當如此辨賴公催官篇云天星氣射天廏星微挨西獸加壬行天廏穴空始為吉左耳受氣官資榮言乾與亥縱非雙行其立穴處須要挨加得法乃不為雜氣所侵如以天皇而穴乾向巽要微於右邊加壬則全受亥氣而不沾乾則天廏之穴始空也凡言西獸者皆以右之白虎為吉非以西獸為乾也今人解作穴挨乾而氣加壬者原不知加壬即是穴塲中氣線移加壬邊立心標也葢心標既立則坐向可任轉移或為天星或為卦氣皆聽裁酌特穴塲中之心標不動耳古人云用卦不用卦卦向穴中作夫謂穴中作者正以在穴塲之中從卦氣非於穴塲之外從卦氣也來山與坐下有辨來山是指來龍入首坐下是指穴塲中入手此云挨加者指坐穴之脈細微入手處也父母之下束氣結咽乃成胎息此為入首之山所謂主星是也入首即是到頭一節到頭開面又必草蛇灰線之脈天輪太極之暈此為穴塲即為入手之脈所謂穴情是也故凡定坐向以龍之入首定穴情以脈之入手欲乘生氣此其緊要吳賴二公之所最為究心處也龍脈有順逆乘氣自當有辨五行有顛倒作用各自有法此言來龍生旺之氣不同而乘之者亦不同也如同一亥也催官篇云迢迢西兊入天皇清貴翰苑誇文章葢亥屬水兊屬金從西兊入天皇是金能生水則亥氣為旺此用正五行而論生旺者也青囊經又云坎癸騰騰入亥乾丙向夾蛇阡何也葢以癸丑屬金壬子屬水乾亥屬木丙屬火今由癸丑金而生壬子水水生乾亥木木生丙向之火此又用雙山五行而論生旺者也賴公用正五行楊公用雙山五行作用各自有法一主於乘生氣而已氣有乘本脈而不容他雜者氣有借旁脈而可隔山取者氣有合初分脈而不為遙逺者氣有串渡峽脈而不邀截者此乃認脈之真正而乘氣為一法梅花院纂云亥無鱗甲用心安又云隔山取氣君須參葢以亥之兩旁為乾為壬皆不可侵所謂無鱗甲也此以本脈取真氣也隔山取氣如巽己丙原屬陰丙可借己巳可借巽皆可隔山而借氣也此以隔山而取真氣也玉尺經云來龍不脫來龍氣此乘初分之氣言也如以亥脈起祖至入穴仍復亥脈其氣與祖合也又云三峽三闗元復元此以渡峽之氣言也如以亥脈過峽渡闗至入穴處仍復亥脈也亦為真氣何者過峽處實為束氣受胎之所所以為真耳葢凡氣脈之真自有父子公孫相肖處此認氣者不可不加察也龍穴無尺寸之移受氣有耳腰之異分金有轉移之巧氣線無毫髮之差此二段乃以挨生棄死存真去偽凝承貫棺蔭骨一線之氣為一法前段言穴之凝結或以正穴而為窩鉗乳突或以怪形而為騎形剪火開孤截蕩或以正落而為本山本氣或以偽落而為斬闗借寓要皆有不可移易之穴塲也豈可尺寸移哉乃受氣則不然或於行龍出脈有順有逆有横有直有隔一宫有隔數宫其受氣或耳或腰内接生氣外接堂氣甚不可拘泥也先賢以人力而敵天工全在於此若謂星卦用事并其生成之穴法而移之則謬矣氣線以入手束氣處為主如艮龍入首戊寅為正氣且戊寅為土亦為本氣所謂坐下自旺無待補助矣若或丙寅七艮之氣則屬火反生艮土為洩乃失之弱宜用分金生養穴如作甲山庚向宜用庚寅分金以庚寅之木可生丙寅之火為生旺也葢二十四字為父母六十龍為胎息凡胎息以生父母為洩故丙寅之氣坐艮中為弱也此於坐線之分金可以轉移而無定格若氣線不可有差者以在束氣入首之處生定此氣不可改移及至穴中掛線乘氣如稍侵癸丑則居三丑之地便非艮矣豈可毫髮差哉故凡氣線既定乃掛坐線坐線既定又當掛雜氣線如艮龍入首有三分寅氣便當掛寅氣一線若作甲山庚向則掛甲庚坐線至於氣線坐線交界之所便為右耳乘氣之所又當於交界受氣處看寅氣何如如有寅氣沖入便當趨避脈路來急當退下一分以避寅氣脈路來緩當進上一分以避寅氣則艮之真氣乃貫棺而無夾雜矣此則至精至微不可毫髮差者也乘氣之喫緊處在此乘氣當避中氣故取三七放棺分金宜乘旺氣亦取三七加向此二段言氣線坐線但當避煞迎生乃乘氣中之第一緊要宇宙間一逢中氣即為衰漸故羅經中以戊子己丑為大空亡正以其度數界在五分中氣之間為無生機也如催官篇亥龍坐壬向丙略加乾位慎入己亥坐乾向巽略加壬位受癸亥之七亥三壬正合此意又如分金加左加右多用三分正以三分則在丙丁庚辛之上不犯戊巳雜煞及兩邊交界之中縫也分金用丙丁庚辛原陰陽正所源載實取卦氣之在兌艮震巽者為陰陽相交故稱旺相要之論乎乘氣則從丙丁庚辛作分金亦不犯沖中之煞而一切空亡闗煞可無患矣脈不直而氣直何畏直來直受氣不斜而棺斜乃為正貫正承此二段正催官篇中承氣之妙訣催官篇云赤蛇頭向天門北直來直向神功烈巽丙受向最為良富貴榮華人英傑夫直來直向為氣沖腦散然或左而加巽右而加丙微微斜受便非沖腦且看入手之脉脊何如一有草蛇灰線之𤣥曲折而入手不為犯陰則以挨加之法而裁之何畏其直所謂脈不直而氣直不為害也若果入手亦是硬直則所謂撩山劈勢倚加插粘之法豈可少哉又云背一面九乘天補氣從右耳為合矩穴宜挨左加天皇富貴榮華震鄉土此言壬龍坐子向午得丙子正壬之氣以貫右耳為合法穴宜挨左以取甲子七壬三亥之氣放棺合丙子正氣為左輔夫不取正壬而取七壬之氣者正為挨過七壬則正壬之氣斜斜貫耳正氣為無虧矣此棺斜受而氣乃能正受之法葢貫耳是一定之氣放棺是左右挨加而為乘氣之活法也催官篇之妙訣正在於此龍以脈為主穴以向為尊水以向而定向以局而分此以水與穴皆以向為重凡論氣者不可不論向也凡葬法内之乘氣一以脈為主亦以正五行為主别無他門若坐穴立向則雖内以乘龍而實外以消水其法多端不可不詳審也如亥入首水自寅艮來由戌乾去若以雙山五行屬木則沖破胎養以正五行屬水則沖破冠帶俱不合度當立丙丁向則水可消葢以𤣥空五行論則丙丁屬火其墓在戌乃可收寅艮之水而發福此以𤣥空五行收向上之水也水有息道漏道從人而成至山向而折之乃漏道則生成之局非人為也故古人定向在於收局當用雙山定之如卯龍巽庚水朝金局也出艮方則金氣巳成當立庚向葢從煞正為迎神避煞之法又如卯龍見寅艮巽己丙水朝是成火局當遷辛向葢木龍見火局不免為洩然遷辛向對看去流此從休囚出水亦乘生脫煞之一法也昔人云無絶水有絶向葢山水已結未有不可葬者或水有不合當於向上轉移而消之自古立向消水有許多法度非以滋後人之惑只是令人有箇法度以合山川之性情不至拂逆而有敗地耳是故法度不必盡合只合得一種便可作福若合諸家而曰吾用某種水法自以為確不可移夫山水性情變態不一而茍執一法以合之豈不謬哉來路看四生坐下看四絶局内看三合向上看雙金此四段乃以各家五行論氣而為收山出煞之法也來路何以看四生昔人所謂地有四勢是也如水土龍從坤申庚兌而來至壬亥結穴是從生方發足旺方到頭此為生旺之龍其發福必大必久又如水土從東方來則為剋洩之地一發便衰矣凡看龍用正五行法當如是坐下何以看四絶如艮龍入首作壬山丙向水從乾亥方出則為火絶胎之地絶胎是禄存所謂四箇禄存流盡必富貴者也葢坐下壬屬火艮寅乃火生長之地而以壬為坐下則火居火地為得位又或水從寅甲來則生養方為貪狼長房必發或水從丙午方來則官旺為武曲中房必發又或水從丁未方來則衰方為巨門小房必發合此三吉從乾亥方出則絶胎為禄存三房並發必為富貴悠逺之地若或水從乾亥方出而誤作癸山丁向為土坐土則乾亥為臨官之地沖破臨官中子必敗矣此坐下所係甚不小也今人但知立向而不知坐下為當慎所以十有九敗耳坐下用洪範五行法當如是亦有以此用之看來脈者如董氏明旨亦用此法凡看來脈當用正五行至用洪範五行參而合之尤為的當理法局内何以看三合如亥龍入首水從卯甲方來至坤未方出口是亥卯未三合此真木局也又如亥龍至庚結穴作卯向水從坤未方出口則龍水坐向皆從木局合為一家更生旺矣看局用雙山五行法當如是向上何以看雙金以辰戌丑未乃四金之地如丑宮為金牛則稱暗金煞或作坤向則𤣥空五行坤屬金木亦在丑是丑為一金坤又為一金合之則為雙金矣此謂龍向皆屬墓便為雙金煞也犯之必定損丁即地甚吉不妨發貴要之人丁終受傷也丑左有艮右有癸皆屬丑分或艮七分而丑三分則可不作丑論若艮丑平分便有暗金侵之俱不可作坤向癸之相兼亦然又乾坤卯午皆屬金而丑艮之龍於此四向皆為雙金矣凡大墓皆屬破軍金推之他龍皆然葢𤣥空五行專用以收山出煞法當如是若陰作陰向陽作陽向猶不沖激或可免禍若以丑而作坤向則陽來沖陰禍更速矣凡五行顛倒今人多不並用不知古人作法各有取義原屬一家只用之各當不失古人作用之意耳洪範五行如丑山未向坐山屬土坤申為長生壬亥為旺地子癸為衰地故古人有丑山髙未水滔滔壬亥拱揖穴堅牢丙巳出口産賢豪之說養生為貪狼屬長官旺為武曲屬中衰為巨門屬幼如破長生則損長長生來則益長凡官旺衰水來去於中小皆然凡龍與水俱宜來生旺也外有八卦五行從納甲中來用之合局為當又有渾天卦爻其五行用之以推煞曜以推子父才官極為有準此皆五行中當究心者制煞莫如乘旺脫煞正以扶生從煞乃化為權留煞正爾迎官此二段以生剋制化為消納之法乃乘氣中補洩之一𤣥機也如離龍入首乾亥水朝來正為煞曜當坐丁向癸收甲水以合乾亥而為乾甲丁之木局木能生火故也氣合而離火旺則乾亥不為煞曜而反為生旺矣此乘旺制煞之一法也又如卯龍入首丙水與艮水從辛而去一派火局洩木之氣即為煞矣當作辛向令煞水直去而不蓄於局中則火氣洩而木氣不傷矣此脫煞扶生之一法也又如亥龍入首後龍帶子癸而來以雙山論屬木水從庚辛方入堂一派金氣則煞水滿局矣當立巽向葢巽庚癸原為一家今以巽與庚辛合而又與亥子癸合夫黨與合而煞化則煞反為權不為我之仇矣此從煞為權之一法也又如巽龍入首辛水當面朝來所謂一條辛水向東流也但以正五行論巽屬木辛屬金則辛金為巽木之煞矣獨以卦氣論則巽辛相納為配合以天星論則天乙太乙為星垣中之兩貴人若山水可作辛向則辛不為煞而為官星矣此迎官就禄之一法也山有山之煞水有水之煞其消納工夫全在生尅制化上探討耳客水客砂尚可招邀取氣真夫真婦猶嫌半路相逢此二段言外合可借内合不可假乃以砂水而乘氣之一法也昔劉公為潘氏作祖地一片方砂不開頭面而東西濶二三百步並無界水插兜却於東南角上有水從巽己曲折而來到右從丙上合流與横水交流到左出丑艮而去劉公即從東南角上㸃穴作巽向人皆疑其渺茫無收拾氣散不聚葬下不數年而科第顯何也此乃巽水邀亥兌之氣入穴且艮出水作巽向接堂氣耳此以外合之客氣而取内之真氣為一法又如砂頭自東趨西北本是坤申來龍然東南巽丙上水來左右兩砂交牙巽丙之朝屈曲到堂有情雖本身蠻曠無界然朝上砂水有情兌氣自聚葢客砂能邀龍氣入局也經云蠻氣一片難收拾却把朝山識倖心此見㝷龍乘氣自有巧處内氣難認當以外氣而認之此為一法又如丙乙相見為夫婦若丙逢丁癸辛水來乙逢甲庚壬水來則配非其偶縱朝向得情終難發福又有乙配丙於中途如丙火生於寅水不自寅來却是己午方來朝出戌此雖正配終非自少至老之夫妻亦為路遇當主衰年科第其發福終遲緩也此以真氣而非真正交媾氣為輕淺乃奪神功改天命者又當自有補弱扶衰之法也此在乘氣者不可不察陰用陽朝陽用陰應合之固眷屬一家山運收山水運收水分之亦互為生旺此二段以朝迎收納而為乘氣之妙訣也如亥龍從西兌而來為陽亥則為甲木以甲木為陽生亥旺卯而墓未當用陰而墓未者配之唯癸水為陰生卯旺亥墓未乃為正配所謂金羊收癸甲之靈也陽木用陰水來配則為陽用陰應若申子辰水局從右轉則為陰癸之水宜用甲來配乃為陰用陽朝葢陽用陰應陽靜而守陰運而用也陰用陽朝陰靜而守陽運而動也陰陽互藏其宅動靜互為其根氣從左行從生趨旺氣從右旋從旺趨生也生旺互交𤣥竅相通而化育成矣此為堪輿家乘氣之第一闗竅也又如亥龍從坎入亥者為陰亥則為乙木以乙木為陰生午旺寅墓戌當用陽而墓戌者配之乃為正配所謂乙丙交而趨戌是也陰陽交媾氣始凝聚然後以向合之當迎寅午之生旺而為朝迎穴依龍以乘内氣向依水以乘外氣山龍以山運收山水龍以水運收水如乙木生於午故午上有髙峯則旺人丁旺於寅故寅上有髙峯則發財禄所謂山管山也丙火生於寅故寅上水來主旺人丁旺於午故午上水來主發財禄所謂水管水也乙木以丙火為配故其朝向收納並從火局宜用寅午為得生旺則水與龍之氣並與向合而為其收納矣若陰遇陰則為純陰不長陽遇陽則為純陽不生縱砂明水秀終非大地唯顧外堂水法隨水立向消其去水以避凶殺而已安能造大福哉如白龍記坎亥入乾陰龍右旋之法寅甲水來長生㑹帝旺水也辛戌水去𤣥竅合也用丙向以帝旺收寅戌也故葬下五子皆顯後取辛戌逆沖丁離則沖破官禄矣故五子皆敗若沖破長生則人丁絶此不知妄作者之所以取禍也主有主氣内宜祕於五行堂有堂氣外宜觀乎四勢龍為地氣當從骨脈實處竅其内而注之水為天氣當從向方虛處竅其外而引之此乃控制山川裁成造化以補洩有餘不足之氣乃改天命奪神功之祕要也凡葬法得金井與門户為一向乃正法也有如外就堂氣則先到之砂水不可不收聚㑹之堂氣不可不納此衆口以為必然者却與龍法之生向不合則以當以天星卦氣為主作内外二向假如亥龍宜作巽向外面砂水又宜作巳向則内用巽向以乘生氣外用巳向以接堂氣亦何嫌於作兩向也此正所謂四勢任君談五行當自守者先哲有云龍之氣未到向之氣先到則布置之法正為改奪之神功也豈易言哉要在察山川之性情審氣脈之强弱或宜補或宜洩或以扶山或以助命或以發乎當代或以應乎後人各各有法不可不精詳焉葢竅内所以導内氣凡所以貫串後龍而使之化駁為純扶衰為旺者皆在此也昔人所謂布置從龍是已竅外之法若人之鼻息然昔人所謂息道通氣不通水者是也如人之一呼一吸得其清氣則吉得其濁氣則凶所係不小是故竅外之法其法最𤣥亦以扶山助命為主耳乃其生剋制化用以化煞為權轉凶為吉固自各各有法大抵在向方砂水上精詳之看砂水之吉凶純駁與龍身之骨脈配合何如合則順其自然而以正合不合則用剪裁制化之法而以變合葢導外氣實以扶内氣也有如外氣乖戾内氣必損傷可不慎哉在天成象在地成形同一氣故天象以太陽為尊而地法以廉貞為主同以火星為萬象之宗象垂吉凶形分禍福同一域故星光以歲星為徳而地法以貪狼為貴同以木星為萬象之華此以舉木火二端以見天象地形之配合不可岐而二也諸如三垣九野同於輿圖之畫井分疆遲留順逆同於龍脈之向背行止吉凶災祥同於國家之安危禍福惡乎有毫髪之爽唯舉其緊要者而言則五行唯土為能生物唯火為能生土是火為宇宙之大祖宗也何者為真火唯一㸃真陽為真火太陽是巳於天為日於卦為離於方為午於星為廉貞於五獸為黄龍且五行餘各有屬唯火無所不寓激石激金則火出是土金有火也木能生火是木有火也泉有温泉海島之中時見火光是水中亦有火也即如人之結胎非得一㸃陽精真火則不能結而為形此㸔地法必以火星為祖方能化生方能逺大亦其理固然耳諸凡都城郡邑必向南離正以午為太陽所居之位次則太陰與日同運又次則金水附日月而行皆以近日為貴故凡結穴太陰太陽又多金水者凡以此也古太史多稱歲星所在其國不可伐豈非以木星為最吉乎九星中以貪狼為首吉者亦以貪狼屬木耳且宇内何者最秀最華豈非木邪夫木發於春而盛於夏謂之華夏煥乎一文明之象以此木星無論沖天紫炁曲直縱横皆是秀體亦無論花芽節苞皆是生機葢地形與天星同以木之精華秀麗為吉象耳由此以推則今人之以天星為渺茫而有絶口置之不道者良可怪也先天一陰一陽對配為主故四龍天星唯取相配陰與陽㑹陽與陰合後天分陰分陽致用為主故八方坐向可借為配坐陽收陰坐陰收陽此言先天後天卦氣有以為體而不可易者有以為用而可移易者此論龍論局之辨也先天之體乾坤以老陰老陽相配坎離為中男中女相配震巽為長男長女相配艮兌為少男少女相配則八龍皆有陰陽相配合而何獨取於四龍也以乾坤純陰純陽為陰陽之老坎離上下皆陰皆陽亦為陰陽之極殊乏生機耳唯震兌上陰而下陽艮巽上陽而下陰乃為陰陽之交宇宙生機並從此出經云四龍天星正以此也諸凡孤虚旺相之說皆原於此非所謂先天統龍法者乎後天自乾至震為陽自巽至兌為隂所謂分陰分陽是已其意亦以乾坤為老退居西北之地而置六子於東南施生之方所以致用也且以洛書而布後天陰陽當可隨方而就或以卦氣或以天干不嫌交配如艮龍而作兌向是為正配雖作丁向亦是從兌所納即作丙向不從卦氣而從天星亦是配合且坐癸向丁坐壬向丙亦不失為坐陽配陰之法所謂陰陽相見是也先天之體無變後天之用有變即地法中無怪龍而有怪穴之意昔人所謂地理尚其變意正如此此用卦大肯綮處不可不理㑹者也諸如翻卦多門五行顛倒豈無謬戻何必拘拘為哉先天後天先為體而後為用貴通其變陰陽二氣陽非賤而陰非貴在適其宜今堪輿家一論地法則以陰龍為勝不知古人視原隰相陰陽各隨所宜豈有貴陰而賤陽之義葢洛書之義一九三七居於四正適合先天乾坤坎離之位二四六八居於四隅適合先天艮兌震巽之位竒數屬陽偶數屬陰配以乾坤坎離亦從乎陽配以震兌艮巽亦從乎陰此今術家以竒耦論陰陽而非先天本來之陰陽也古人建都立國南面而治位於四正正以乾南坤北正天地之位離東坎西應日月之門於天道為正於地勢為宜非故去隂而取陽抑亦先天之卦體宜爾也至如安墳厝骨古人多取艮兌震巽四卦亦以先天卦體風雷相為動盪山澤互為流通用以蔭枯骨則易以生發焉耳豈以位居二四六八之陰而即為貴哉若論地位則所謂神仙之地發自天門帝王之地起自金龍者非乾與震乎且後天震兌為先天之坎離後天乾坤即先天之巽艮亦安得以後天之位而易先天之氣也大要地法當以龍勢為主其大小貴賤只在龍勢上定之乃如卦氣逢陽則陽逢陰則陰或宜陽而從陽或宜陰而從陰若拂四勢之宜而强以從卦此膠柱鼔瑟刻舟求劒之迂術也豈能合山川情性而通地之靈儌地之福哉地以八方正位定坤道之輿圖故以正子午為地盤居内以應地之實天以十二分野正躔度之次舍故以壬子丙午為天盤居外以應天之虚今人論針乃有正針縫針之分且有彼是此非又有專用此而不用彼者葢不知二針各有取義相為用而不相為悖耳地盤何取於正子午也原地盤分屬以八卦為分屬一從河雒中來河圖之象列以八方雒書之數亦有四正四隅舍此之外則無理氣經之所謂氣從八方混元子所謂八方定位靈轄經所謂内立八極以統八方之氣是也夫既以八方分位則壬子癸共一坎也丙午丁共一離也一卦三山其以正子午為地之中夫何疑乎古人用以測地正為氣從八方故以正子午之針打龍所謂龍從地下求者指地盤言也夫地氣何以分貴賤乃從天星也天之躔度以十二次舍為分壬子共一子也何以辨之凡次舍十二每次分得三十度合考之𤣥枵次舍自女八度起至危十五度方成三十度夫女四星十一度半屬癸今𤣥枵起於女八度是僅侵癸之三度而已虛二星九度半屬坎危三星十八度屬壬今𤣥枵止於危十五度亦僅成剩壬之三度而已則𤣥枵子分豈非壬子之間乎故以壬子之間為天盤之子又復何疑即子而推丙午亦共一午則壬子丙午之間正為天之中矣古人向從天中立正以應天之虛從天盤也葢地氣靜故㝷龍捉脈當以地盤之靜定為主天氣動故收水立向當以天盤之旋動為主且貴賤在天星若不從天盤而定則天星無據將何以發用乎是故收生旺之氣於坐下而又迎吉曜之氣於向方則天與地通而動與靜合斯可以召福而迎祥也然則正針縫針豈有偏重偏用之理但龍是一定之龍向無一定之向縱龍脈有挨加亦是因向方而有挨加昔人云立穴易立向難正以動體之難捉摸耳夫所謂神而明之存乎其人者其在天盤乎靈城精義卷下
